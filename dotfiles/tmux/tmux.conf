# =============================================================================
# tmux.conf — terminal multiplexer config
# Prefix key is Ctrl+A (instead of the default Ctrl+B)
# =============================================================================

# ─── Terminal & color support ─────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
# Pass through cursor shape escape codes so Neovim/pi can change the cursor style
set -ga terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[ q'
# Pass RGB true color support to the outer terminal
set -ag terminal-overrides ",xterm-256color:RGB"

# Extended key encoding — needed so pi (and Neovim) can distinguish keys like
# Shift+Enter from plain Enter inside tmux
set -g extended-keys on
set -g extended-keys-format csi-u

# ─── Prefix key ───────────────────────────────────────────────────────────────
# Change prefix from Ctrl+B to Ctrl+A (easier to reach, same as screen)
unbind C-b
set -g prefix C-a
bind C-a send-prefix   # press Ctrl+A twice to send a literal Ctrl+A to the shell

# ─── General behaviour ────────────────────────────────────────────────────────
set -g mouse on                # click to select panes, scroll with mousewheel
set -g base-index 1            # start window numbering at 1 (not 0)
setw -g pane-base-index 1      # start pane numbering at 1
set -g renumber-windows on     # keep window numbers sequential when one is closed
set -g history-limit 50000     # lines of scrollback buffer per pane
set -sg escape-time 0          # no delay after pressing Escape (important for Neovim)
set -g focus-events on         # forward focus events to panes (Neovim autoread)
set -g status-position top     # put the status bar at the top

# When you close the last pane in a session, don't exit tmux entirely.
# Instead, switch to the next available session — crucial when using sesh.
set -g detach-on-destroy off

# ─── Window & pane splits ─────────────────────────────────────────────────────
# Open new panes in the same directory as the current pane
bind | split-window -h -c "#{pane_current_path}"   # | splits vertically (side by side)
bind - split-window -v -c "#{pane_current_path}"   # - splits horizontally (stacked)
bind c new-window -c "#{pane_current_path}"         # new window in current dir
unbind '"'
unbind %

# ─── Pane navigation ──────────────────────────────────────────────────────────
# vim-tmux-navigator (plugin below) handles Ctrl+h/j/k/l for moving between
# both tmux panes and Neovim splits seamlessly. These bindings are kept as a
# fallback using the prefix key (prefix+h/j/k/l).
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ─── Pane resizing ────────────────────────────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Toggle zoom — make the current pane fill the whole window (press again to restore)
bind -r m resize-pane -Z

# ─── Kill without confirmation prompt ─────────────────────────────────────────
bind-key x kill-pane

# ─── Copy mode (vi-style) ─────────────────────────────────────────────────────
# Copy mode lets you scroll and select text without a mouse.
setw -g mode-keys vi
bind v copy-mode                                        # enter copy mode with prefix+v
bind-key -T copy-mode-vi 'v' send -X begin-selection   # start selecting text
bind-key -T copy-mode-vi 'y' send -X copy-selection    # yank (copy) selected text
unbind -T copy-mode-vi MouseDragEnd1Pane                # don't exit copy mode on mouse release

# ─── Reload config ────────────────────────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "tmux.conf reloaded"

# ─── Sesh session picker ──────────────────────────────────────────────────────
# Press prefix+O to open a fuzzy session picker.
# Keys inside the picker:
#   Ctrl+A  — show everything (tmux sessions + sesh configs + zoxide dirs)
#   Ctrl+T  — show only running tmux sessions
#   Ctrl+G  — show only sesh config sessions
#   Ctrl+D  — kill the selected tmux session
bind-key "O" run-shell "sesh connect \"$(
  sesh list -t -c -H --icons | fzf-tmux -p 80%,70% \
    --ansi \
    --border-label ' sesh ' \
    --prompt '⚡ ' \
    --header ' ^a all ^t tmux ^g configs ^d kill' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡ )+reload(sesh list -t -c -H --icons)' \
    --bind 'ctrl-t:change-prompt(🪟 )+reload(sesh list -t -H --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c -H --icons)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡ )+reload(sesh list -t -c -H --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""

# =============================================================================
# Plugins (via TPM — Tmux Plugin Manager)
# After editing this section: press prefix+I to install, prefix+U to update.
# =============================================================================

# ─── Catppuccin theme ─────────────────────────────────────────────────────────
# Catppuccin is a pastel dark theme. We pin to v2.1.3 for stability.
# Flavors available: latte (light), frappe, macchiato, mocha (darkest)
set -g @plugin 'catppuccin/tmux#v2.1.3'
set -g @catppuccin_flavor "mocha"

# Window tab style in the status bar ("basic", "rounded", "slanted", etc.)
set -g @catppuccin_window_status_style "rounded"

# What to show in each window tab — just the window name, prefixed with a space
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"

# Turn off tmux's auto-rename so your window names stay as you set them
set -g automatic-rename off

# Load the Catppuccin plugin before composing the status bar so its color
# variables are available when we reference them below
run '~/.tmux/plugins/tmux/catppuccin.tmux'

# ─── Status bar composition ───────────────────────────────────────────────────
set -g status-left-length 100
set -g status-right-length 100

# Left: session name badge.
# Changes color when prefix is active (mauve normally, red when waiting for key)
set -g @catppuccin_session_color "#{?client_prefix,#{E:@thm_red},#{E:@thm_mauve}}"
set -g status-left "#{E:@catppuccin_status_session} "

# Right: CPU % | RAM % | battery | uptime
# Each module is provided by its corresponding TPM plugin below
set -g status-right ""
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -agF status-right "#{E:@catppuccin_status_battery}"

# ─── Session persistence plugins ──────────────────────────────────────────────
# tmux-resurrect: save (prefix+Ctrl+S) and restore (prefix+Ctrl+R) sessions
# tmux-continuum: auto-saves every 15 min, auto-restores on tmux server start
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# ─── vim-tmux-navigator ───────────────────────────────────────────────────────
# Lets you move between tmux panes AND Neovim splits with the same keys:
#   Ctrl+h  — move left
#   Ctrl+j  — move down
#   Ctrl+k  — move up
#   Ctrl+l  — move right
# Without this, you'd need separate bindings for tmux panes vs Neovim windows.
# NOTE: requires the matching plugin on the Neovim side too. LazyVim includes
# it as an optional extra — add "editing.vim-tmux-navigator" to your extras.
set -g @plugin 'christoomey/vim-tmux-navigator'

# ─── Status bar data plugins ──────────────────────────────────────────────────
# These provide the #{...} variables used in status-right above
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-cpu'

# ─── TPM — must stay at the very bottom ───────────────────────────────────────
# TPM manages all the plugins listed above.
# First-time setup: press prefix+I inside tmux to clone and install them.
set -g @plugin 'tmux-plugins/tpm'
run '~/.tmux/plugins/tpm/tpm'
